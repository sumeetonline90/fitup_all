name: fitup
description: Fitup - Holistic Health AI
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^14.2.0
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  flutter_foreground_task: ^9.2.2
  health: ^13.3.1
  fl_chart: ^0.68.0
  mobile_scanner: ^5.2.3
  google_generative_ai: ^0.4.3
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  firebase_storage: ^12.3.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_remote_config: ^5.1.0
  flutter_local_notifications: ^17.2.2
  purchases_flutter: ^9.15.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  speech_to_text: ^7.3.0
  lottie: ^3.1.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  drift: ^2.18.1
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  hive_flutter: ^1.1.0
  dartz: ^0.10.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.3
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  intl: ^0.20.2
  logger: ^2.4.0
  envied: ^1.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  http: ^1.2.2
  permission_handler: ^11.3.1
  just_audio: ^0.9.40
  shared_preferences: ^2.3.3
  timezone: ^0.9.4
  package_info_plus: ^9.0.0
  syncfusion_flutter_pdf: ^28.2.4
  crypto: ^3.0.6
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  drift_dev: ^2.18.1
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  flutter_lints: ^4.0.0
  envied_generator: ^1.3.3
  flutter_launcher_icons: ^0.14.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: false
  adaptive_icon_background: "#0e0e0e"
  adaptive_icon_foreground: "assets/images/logo.png"
